# Cloud Build pipeline for PharmKo
#
# Prerequisites: Run scripts/gcp-setup.sh once before the first build to create
# the Artifact Registry repo, service account, IAM bindings, and Cloud SQL instance.
#
# Pipeline steps:
#   1. Build container image with Artifact Registry tags
#   2. Push commit SHA tag to Artifact Registry
#   3. Push latest tag to Artifact Registry
#   4. Deploy to Cloud Run with secret injection and dedicated service account

steps:
  # Step 1: Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/pharmko-repo/pharmko-app:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/pharmko-repo/pharmko-app:latest'
      - '.'

  # Step 2: Push commit SHA tag to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/pharmko-repo/pharmko-app:$COMMIT_SHA']

  # Step 3: Push latest tag to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/pharmko-repo/pharmko-app:latest']

  # Step 4: Deploy to Cloud Run with secrets, env vars, and dedicated service account
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'pharmko-app'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/pharmko-repo/pharmko-app:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--service-account'
      - 'pharmko-cloudrun-sa@$PROJECT_ID.iam.gserviceaccount.com'
      - '--set-secrets'
      - 'GEMINI_API_KEY=gemini-api-key:latest,FDA_API_KEY=fda-api-key:latest,GOOGLE_OAUTH_CLIENT_ID=google-oauth-client-id:latest,GOOGLE_OAUTH_CLIENT_SECRET=google-oauth-client-secret:latest,FACEBOOK_APP_ID=facebook-app-id:latest,FACEBOOK_APP_SECRET=facebook-app-secret:latest,CLOUD_SQL_PASSWORD=cloud-sql-password:latest,GCS_BUCKET_NAME=gcs-bucket-name:latest'
      - '--set-env-vars'
      - 'CLOUD_SQL_INSTANCE=$PROJECT_ID:us-central1:pharmko-db,CLOUD_SQL_USER=pharmko,CLOUD_SQL_DATABASE=pharmko,CLOUD_SQL_TYPE=postgresql,AUTH_ENABLED=true,ALLOWED_ORIGINS=https://pharmko-app-460663669978.us-central1.run.app'
      - '--memory'
      - '512Mi'
      - '--timeout'
      - '300'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/pharmko-repo/pharmko-app:$COMMIT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/pharmko-repo/pharmko-app:latest'
