version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    ports:
      - "5000:5000"
    environment:
      - FLASK_APP=main.py
      - PORT=5000
      - GCP_PROJECT_ID=${GCP_PROJECT_ID:-your-project-id}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - FDA_API_KEY=${FDA_API_KEY:-}
    volumes:
      - ./backend:/app/backend
    working_dir: /app

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_BACKEND_URL=http://backend:5000
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - backend
